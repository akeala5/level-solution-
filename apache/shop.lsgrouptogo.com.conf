# ─── HTTP → HTTPS REDIRECT ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName shop.lsgrouptogo.com

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ─── VHOST PRINCIPAL HTTPS ────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName shop.lsgrouptogo.com

    # ─── SSL (Let's Encrypt) ──────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/lsgrouptogo.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/lsgrouptogo.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # ─── COMPRESSION GZIP (mod_deflate) ──────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/x-javascript text/javascript
        AddOutputFilterByType DEFLATE image/svg+xml font/woff font/woff2
        AddOutputFilterByType DEFLATE application/manifest+json text/xml
        # Ne pas compresser ce qui est déjà compressé
        SetEnvIfNoCase Request_URI \.(?:gif|jpe?g|png|webp|avif|ico|zip|gz|br)$ no-gzip
        Header append Vary Accept-Encoding
    </IfModule>

    # ─── HEADERS SECURITE ─────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set X-Frame-Options             "SAMEORIGIN"
    Header always set X-Content-Type-Options      "nosniff"
    Header always set X-XSS-Protection            "1; mode=block"
    Header always set Referrer-Policy             "strict-origin-when-cross-origin"

    # ─── CONNEXIONS PERSISTANTES ──────────────────────────────────────────────
    KeepAlive On
    KeepAliveTimeout 5
    MaxKeepAliveRequests 100

    # ─── PROXY SETTINGS ───────────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   %{REMOTE_ADDR}s

    # Timeouts proxy — évite les blocages indéfinis si le backend est lent
    ProxyTimeout 30

    # Bufferisation des réponses proxy (évite de garder les connexions ouvertes)
    <IfModule mod_proxy_html.c>
        ProxyHTMLEnable Off
    </IfModule>

    # ─── WEBSOCKETS (Chat + Enchères temps réel) ──────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/socket.io/(.*) ws://127.0.0.1:3001/socket.io/$1 [P,L]

    # ─── API BACKEND (NestJS port 3001) ───────────────────────────────────────
    <Location "/api/">
        ProxyPass        http://127.0.0.1:3001/api/
        ProxyPassReverse http://127.0.0.1:3001/api/
    </Location>

    # ─── FRONTEND NEXT.JS (port 3000) ─────────────────────────────────────────
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ─── CACHE ASSETS STATIQUES NEXT.JS ──────────────────────────────────────
    # _next/static/* = noms hashés → cache 1 an immutable (jamais périmé)
    <LocationMatch "^/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # Autres assets statiques (images, fonts, favicon…)
    <LocationMatch "\.(ico|gif|jpg|jpeg|png|svg|webp|avif|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, max-age=604800, stale-while-revalidate=86400"
        ExpiresActive On
        ExpiresDefault "access plus 7 days"
    </LocationMatch>

    # CSS et JS non-hashés → 1 heure
    <LocationMatch "\.(css|js)$">
        Header set Cache-Control "public, max-age=3600, stale-while-revalidate=60"
    </LocationMatch>

    # ─── LOGS ─────────────────────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/shop.lsgrouptogo.com-error.log
    CustomLog /var/log/apache2/shop.lsgrouptogo.com-access.log combined
</VirtualHost>
