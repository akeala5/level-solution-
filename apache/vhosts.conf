# ─── HTTP → HTTPS REDIRECT ────────────────────────────────────────────────────
<VirtualHost *:80>
    ServerName ls-marketplace.com
    ServerAlias www.ls-marketplace.com

    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

# ─── VHOST PRINCIPAL HTTPS ────────────────────────────────────────────────────
<VirtualHost *:443>
    ServerName ls-marketplace.com
    ServerAlias www.ls-marketplace.com

    # ─── SSL ──────────────────────────────────────────────────────────────────
    SSLEngine On
    SSLCertificateFile    /usr/local/apache2/conf/ssl/fullchain.pem
    SSLCertificateKeyFile /usr/local/apache2/conf/ssl/privkey.pem
    SSLProtocol           TLSv1.2 TLSv1.3
    SSLCipherSuite        ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384
    SSLHonorCipherOrder   Off
    SSLSessionCache       shmcb:/usr/local/apache2/logs/ssl_gcache_data(512000)
    SSLSessionCacheTimeout 300

    # ─── HEADERS SECURITE ─────────────────────────────────────────────────────
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ─── PROXY SETTINGS ───────────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyRequests Off
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For %{REMOTE_ADDR}s

    # ─── WEBSOCKETS (Chat temps réel) ─────────────────────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/socket.io/(.*) ws://127.0.0.1:3001/socket.io/$1 [P,L]

    # ─── API BACKEND ──────────────────────────────────────────────────────────
    <Location "/api/">
        ProxyPass http://127.0.0.1:3001/api/
        ProxyPassReverse http://127.0.0.1:3001/api/
    </Location>

    # ─── FRONTEND NEXT.JS ─────────────────────────────────────────────────────
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # ─── CACHE ASSETS STATIQUES ───────────────────────────────────────────────
    <LocationMatch "\.(ico|css|js|gif|jpg|jpeg|png|svg|woff|woff2|ttf|eot|webp|avif)$">
        Header append Cache-Control "public, max-age=86400"
        ExpiresActive On
        ExpiresDefault "access plus 1 day"
    </LocationMatch>

    # ─── LOGS ─────────────────────────────────────────────────────────────────
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined
</VirtualHost>
