name: CI/CD — LS Marketplace

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── LINT & TYPE CHECK BACKEND ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ls-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ls-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint || true
      - run: npx tsc --noEmit

  # ─── TESTS UNITAIRES BACKEND ─────────────────────────────────────────────────
  backend-tests:
    name: Backend — Tests unitaires (Jest)
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ls-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ls-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --passWithNoTests
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ls-backend/coverage
          retention-days: 7

  # ─── LINT & TYPE CHECK FRONTEND ──────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ls-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ls-frontend/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit

  # ─── TESTS E2E FRONTEND ──────────────────────────────────────────────────────
  frontend-e2e:
    name: Frontend — E2E Playwright
    runs-on: ubuntu-latest
    needs: frontend-lint
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ls-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ls-frontend/package-lock.json

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run E2E tests
        run: E2E_BASE_URL=http://localhost:3000 npx playwright test --reporter=list
        env:
          CI: true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ls-frontend/playwright-report
          retention-days: 7

  # ─── DÉPLOIEMENT PRODUCTION ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Production (VPS natif)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-lint]
    # Auto-deploy DESACTIVE (deploiement manuel — VPS fragile, chemin historique errone). Voir session SHOPLS-PRO.
    if: false
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd /var/www/ls-marketplace
            bash deploy.sh
