version: '3.9'

services:
  # ─── BASE DE DONNÉES ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ls_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ls_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ls_password}
      POSTGRES_DB: ${POSTGRES_DB:-ls_marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ls_user} -d ${POSTGRES_DB:-ls_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── CACHE REDIS ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ls_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MEILISEARCH ─────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: ls_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-changeme_meilisearch_key}
      MEILI_ENV: ${NODE_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND NESTJS ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./ls-backend
      dockerfile: Dockerfile
      target: production
    container_name: ls_backend
    restart: unless-stopped
    env_file: ./ls-backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ls_user}:${POSTGRES_PASSWORD:-ls_password}@postgres:5432/${POSTGRES_DB:-ls_marketplace}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password}
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-changeme_meilisearch_key}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── FRONTEND NEXT.JS ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./ls-frontend
      dockerfile: Dockerfile
      target: production
    container_name: ls_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://backend:3001}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ─── REVERSE PROXY APACHE ─────────────────────────────────────────────────────
  apache:
    image: httpd:2.4-alpine
    container_name: ls_apache
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./apache/vhosts.conf:/usr/local/apache2/conf/extra/httpd-vhosts.conf:ro
      - ./apache/ssl:/usr/local/apache2/conf/ssl:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  default:
    name: ls_network
